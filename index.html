<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÒNG TAY · Tuyển tập video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fafafa; --surface:#ffffff; --ink:#0f1012; --ink-2:#6b7180;
    --line:#ececef; --line-2:#e0e3e8; --accent:#ff3b25; --accent-soft:#ffece8;
    --radius:14px; --maxw:1180px; --nav-h:62px; --shadow:0 14px 34px -14px rgba(15,16,18,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;scroll-padding-top:calc(var(--nav-h) + 20px)}
  body{background:var(--bg);color:var(--ink);
    font-family:"Be Vietnam Pro",system-ui,sans-serif;line-height:1.55;
    -webkit-font-smoothing:antialiased;overflow-x:hidden}
  /* nền: hơi sáng phía trên cho có chiều sâu, tối giản */
  body::before{content:"";position:fixed;inset:0 0 auto;height:480px;pointer-events:none;z-index:0;
    background:radial-gradient(80% 100% at 50% -20%, rgba(255,59,37,.06), transparent 70%)}
  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ===== NAV ===== */
  nav{position:sticky;top:0;z-index:40;height:var(--nav-h);
    background:rgba(250,250,250,.8);backdrop-filter:blur(12px);
    border-bottom:1px solid transparent;transition:border-color .3s,box-shadow .3s}
  nav.scrolled{border-color:var(--line);box-shadow:0 6px 20px -14px rgba(15,16,18,.3)}
  .navin{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:100%;
    display:flex;align-items:center;justify-content:space-between;gap:18px}
  .logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
  .logo h1{font-weight:800;font-size:19px;letter-spacing:-.02em;line-height:1}
  .navlinks{display:flex;align-items:center;gap:8px}
  .navlinks a.simple{color:var(--ink-2);text-decoration:none;font-size:14px;font-weight:500;
    padding:8px 12px;border-radius:8px;transition:color .15s}
  .navlinks a.simple:hover{color:var(--ink)}
  .dd{position:relative}
  .ddbtn{display:flex;align-items:center;gap:7px;cursor:pointer;background:var(--ink);color:#fff;
    border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;
    padding:10px 15px;transition:background .18s}
  .ddbtn:hover{background:#26282d}
  .ddbtn .arr{transition:transform .2s}
  .dd.open .ddbtn .arr{transform:rotate(180deg)}
  .ddmenu{position:absolute;right:0;top:calc(100% + 10px);min-width:250px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:7px;
    opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .2s;max-height:70vh;overflow:auto}
  .dd.open .ddmenu{opacity:1;visibility:visible;transform:none}
  .ddmenu a{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);
    font-size:14px;font-weight:500;padding:10px 11px;border-radius:8px;transition:background .12s}
  .ddmenu a:hover{background:var(--bg)}
  .ddmenu a .ic{font-size:16px;line-height:1}
  .ddmenu a b{margin-left:auto;font-weight:600;font-size:12px;color:var(--ink-2)}

  /* ===== HERO ===== */
  header.hero{padding:72px 0 40px;text-align:center}
  .hero>*{opacity:0;animation:up .8s cubic-bezier(.2,.7,.2,1) forwards}
  .hero .kicker{animation-delay:.04s}.hero h2{animation-delay:.12s}
  .hero p{animation-delay:.2s}.hero .search{animation-delay:.28s}.hero .quick{animation-delay:.36s}
  @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .hero .kicker{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  .hero h2{font-weight:800;font-size:clamp(40px,8vw,76px);line-height:1;letter-spacing:-.035em;margin:14px 0 14px}
  .hero p{color:var(--ink-2);font-size:clamp(15px,2.2vw,18px);max-width:520px;margin:0 auto;font-weight:400}
  .search{position:relative;max-width:460px;margin:30px auto 0}
  .search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--ink-2)}
  .search input{width:100%;background:var(--surface);border:1px solid var(--line-2);color:var(--ink);
    font-family:inherit;font-size:15px;padding:14px 16px 14px 46px;border-radius:12px;outline:none;
    transition:border-color .2s,box-shadow .2s}
  .search input::placeholder{color:var(--ink-2)}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .quick{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:26px auto 0;max-width:840px}
  .quick a{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--ink);
    border:1px solid var(--line-2);background:var(--surface);font-size:13px;font-weight:500;
    padding:8px 14px;border-radius:100px;transition:all .16s}
  .quick a:hover{border-color:var(--ink);transform:translateY(-2px)}
  .quick a .ic{font-size:15px;line-height:1}

  /* ===== SECTIONS ===== */
  .catsec{padding:50px 0 6px}
  .sechead{display:flex;align-items:center;gap:13px;padding-bottom:18px;margin-bottom:26px;
    border-bottom:1px solid var(--line-2)}
  .sechead .ic{font-size:26px;line-height:1}
  .sechead h3{font-weight:700;font-size:clamp(21px,3vw,28px);letter-spacing:-.02em}
  .sechead .num{margin-left:auto;font-size:13px;font-weight:600;color:var(--ink-2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
  .catsec.clamped .card.extra{display:none}
  .more{display:flex;justify-content:center;margin-top:30px}
  .morebtn{font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line-2);border-radius:100px;padding:11px 26px;
    display:inline-flex;align-items:center;gap:8px;transition:all .16s}
  .morebtn:hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:var(--shadow)}
  .morebtn .ar{transition:transform .2s}

  .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;position:relative;
    transition:transform .25s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s,opacity .6s ease}
  .card:hover{transform:translateY(-6px);border-color:var(--line-2);box-shadow:var(--shadow)}
  .thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#f0f0f2}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s}
  .card:hover .thumb img{transform:scale(1.06)}
  .gen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.5}
  .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(15,16,18,.18);opacity:0;transition:opacity .25s}
  .card:hover .play{opacity:1}
  .play b{width:54px;height:54px;border-radius:50%;background:var(--accent);display:flex;
    align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(255,59,37,.45);
    transform:scale(.85);transition:transform .25s}
  .card:hover .play b{transform:scale(1)}
  .play b::after{content:"";border-style:solid;border-width:8px 0 8px 14px;
    border-color:transparent transparent transparent #fff;margin-left:3px}
  .dur{position:absolute;right:9px;bottom:9px;background:rgba(15,16,18,.82);color:#fff;
    font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;backdrop-filter:blur(2px)}
  .cbody{padding:14px 16px 18px}
  .cat{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
  .card h4{font-size:17px;font-weight:600;line-height:1.3;margin:6px 0 5px;letter-spacing:-.01em}
  .card p{font-size:13.5px;color:var(--ink-2);display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden}

  .state{text-align:center;padding:90px 20px;color:var(--ink-2)}
  .state p{font-size:16px;margin-top:16px}
  .spinner{width:40px;height:40px;border:3px solid var(--line-2);border-top-color:var(--accent);
    border-radius:50%;margin:0 auto;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== PLAYER ===== */
  .modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    padding:24px;background:rgba(15,16,18,.6);backdrop-filter:blur(6px)}
  .modal.open{display:flex;animation:fade .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .player{width:100%;max-width:960px;background:#000;border-radius:16px;overflow:hidden;
    box-shadow:0 40px 90px -20px rgba(0,0,0,.55);animation:pop .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .pframe{position:relative;aspect-ratio:16/9;background:#000}
  .pframe video,.pframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .pmeta{padding:16px 20px 20px;background:var(--surface)}
  .pmeta .cat{margin-bottom:4px}
  .pmeta h3{font-size:21px;font-weight:700;margin-bottom:5px;letter-spacing:-.01em}
  .pmeta p{color:var(--ink-2);font-size:14.5px}
  .close{position:absolute;top:16px;right:18px;z-index:2;width:40px;height:40px;border-radius:50%;
    border:none;background:rgba(255,255,255,.92);color:#0f1012;font-size:22px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s}
  .close:hover{background:var(--accent);color:#fff;transform:rotate(90deg)}
  footer{border-top:1px solid var(--line);margin-top:46px;padding:28px 0 50px;color:var(--ink-2);
    font-size:13px;text-align:center}
  @media(max-width:640px){.navlinks a.simple{display:none}.hero{padding:48px 0 28px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav id="nav">
  <div class="navin">
    <a class="logo" href="#top">
      <svg width="30" height="30" viewBox="0 0 48 48" fill="none">
        <circle cx="15" cy="30" r="10" stroke="#ff3b25" stroke-width="2.6"/>
        <circle cx="33" cy="30" r="10" stroke="#0f1012" stroke-width="2.6"/>
        <path d="M15 20v-4a4 4 0 0 1 4-4M33 20v-4a4 4 0 0 0-4-4" stroke="#0f1012" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M19 12h10" stroke="#ff3b25" stroke-width="2.6" stroke-linecap="round"/>
      </svg>
      <h1 data-site-title>CÒNG TAY</h1>
    </a>
    <div class="navlinks">
      <a class="simple" href="#top">Trang chủ</a>
      <div class="dd" id="dd">
        <button class="ddbtn" id="ddbtn">Danh mục
          <svg class="arr" width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="ddmenu" id="ddmenu"></div>
      </div>
    </div>
  </div>
</nav>

<div class="wrap">
  <span id="top"></span>
  <header class="hero">
    <div class="kicker">Tuyển tập video</div>
    <h2 data-site-title>CÒNG TAY</h2>
    <p>Bộ sưu tập video giải trí, phân theo từng danh mục.</p>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/>
      </svg>
      <input id="q" type="text" placeholder="Tìm video..." autocomplete="off">
    </div>
    <div class="quick" id="quick"></div>
  </header>
  <main id="content"><div class="state"><div class="spinner"></div><p>Đang tải video...</p></div></main>
  <footer>© <span id="yr"></span> <span id="footerText">CÒNG TAY — Tuyển tập video giải trí.</span></footer>
</div>

<div class="modal" id="modal">
  <div class="player">
    <button class="close" id="close" aria-label="Đóng">×</button>
    <div class="pframe" id="pframe"></div>
    <div class="pmeta"><div class="cat" id="pcat"></div><h3 id="ptitle"></h3><p id="pdesc"></p></div>
  </div>
</div>

<script>
/* ================================================================
   Đọc dữ liệu từ videos.json nằm cùng thư mục (không cần CORS).
   ================================================================ */
const DATA_URL = "/api/videos";

/* ---------- không cần sửa từ đây trở xuống ---------- */
const content=document.getElementById('content'),ddmenu=document.getElementById('ddmenu'),
      quick=document.getElementById('quick'),qEl=document.getElementById('q'),
      modal=document.getElementById('modal'),pframe=document.getElementById('pframe'),
      nav=document.getElementById('nav');
let VIDEOS=[], CATEGORIES=[], SETTINGS={}, query="";
document.getElementById('yr').textContent=new Date().getFullYear();

function slug(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

/* biểu tượng theo danh mục: tra trong categories.json trước, nếu không có thì suy theo từ khóa */
function guessIcon(cat){const c=cat.toLowerCase();
  if(c.includes("phim")) return "🎬";
  if(c.includes("trung qu")) return "🇨🇳";
  if(c.includes("việt nam")||c.includes("viet nam")) return "🇻🇳";
  if(c.includes("hàn")||c.includes("han")) return "🇰🇷";
  if(c.includes("thái")||c.includes("thai")) return "🇹🇭";
  if(c.includes("quốc tế")||c.includes("quoc te")) return "🌍";
  return "🔒";}
function catIcon(cat){const found=CATEGORIES.find(c=>c.name===cat);
  return (found&&found.icon)||guessIcon(cat);}

function groupByCategory(list){const m=new Map();
  list.forEach(v=>{if(!m.has(v.category))m.set(v.category,[]);m.get(v.category).push(v);});return m;}

/* thứ tự danh mục: theo categories.json trước, các danh mục lẻ (chỉ có ở video) xếp cuối */
function orderedGroups(){const map=groupByCategory(VIDEOS),out=[],seen=new Set();
  CATEGORIES.forEach(c=>{if(map.has(c.name)){out.push([c.name,map.get(c.name)]);seen.add(c.name);}});
  map.forEach((items,name)=>{if(!seen.has(name))out.push([name,items]);});
  return out;}

function applySettings(){const s=SETTINGS||{};
  if(s.siteTitle){document.querySelectorAll('[data-site-title]').forEach(el=>el.textContent=s.siteTitle);
    document.title=s.siteTitle+" · Tuyển tập video";}
  if(s.heroKicker!=null)document.querySelector('.hero .kicker').textContent=s.heroKicker;
  if(s.heroSubtitle!=null)document.querySelector('.hero p').textContent=s.heroSubtitle;
  if(s.footer!=null)document.getElementById('footerText').textContent=s.footer;}

const SECTION_LIMIT=6;          // số video hiện sẵn mỗi mục (còn lại ẩn sau "Xem thêm")
const ALL_ID="sec-all";         // id mục "Tất cả video"

/* tất cả video, sắp theo thời gian tải lên gần nhất.
   video cũ chưa có createdAt giữ nguyên thứ tự mảng (vốn đã mới-trước) và xếp sau nhóm có mốc thời gian */
function allVideosSorted(){
  return VIDEOS.map((v,i)=>({v,i})).sort((a,b)=>{
    const ta=a.v.createdAt,tb=b.v.createdAt;
    if(ta!=null&&tb!=null)return tb-ta;
    if(ta!=null)return -1;
    if(tb!=null)return 1;
    return a.i-b.i;
  }).map(x=>x.v);
}
function matchQ(v){return !query||(v.title+v.desc+v.category).toLowerCase().includes(query);}

function cardHTML(v,delay,extra){const idx=VIDEOS.indexOf(v);
  const thumb=v.thumb?`<img src="${v.thumb}" alt="" loading="lazy">`:`<div class="gen">${catIcon(v.category)}</div>`;
  return `<article class="card reveal${extra?' extra':''}" style="transition-delay:${delay}ms" data-i="${idx}">
    <div class="thumb">${thumb}<div class="play"><b></b></div><span class="dur">${v.duration||""}</span></div>
    <div class="cbody"><div class="cat">${v.category}</div><h4>${v.title}</h4><p>${v.desc||""}</p></div>
  </article>`;}

function sectionHTML(id,ic,name,items){
  const limited=!query&&items.length>SECTION_LIMIT;
  const cards=items.map((v,i)=>cardHTML(v,Math.min(i,6)*50,limited&&i>=SECTION_LIMIT)).join('');
  const more=limited
    ? `<div class="more"><button class="morebtn" data-sec="${id}">Xem thêm ${items.length-SECTION_LIMIT} video <span class="ar">↓</span></button></div>`
    : '';
  return `<section class="catsec${limited?' clamped':''}" id="${id}">
    <div class="sechead reveal"><span class="ic">${ic}</span><h3>${name}</h3>
      <span class="num">${items.length} video</span></div>
    <div class="grid">${cards}</div>${more}</section>`;
}

function buildMenu(){
  let dd=`<a href="#${ALL_ID}"><span class="ic">🆕</span>Tất cả video<b>${VIDEOS.length}</b></a>`;
  let qk=`<a href="#${ALL_ID}"><span class="ic">🆕</span>Tất cả</a>`;
  orderedGroups().forEach(([cat,items])=>{const id="cat-"+slug(cat),ic=catIcon(cat);
    dd+=`<a href="#${id}"><span class="ic">${ic}</span>${cat}<b>${items.length}</b></a>`;
    qk+=`<a href="#${id}"><span class="ic">${ic}</span>${cat}</a>`;});
  ddmenu.innerHTML=dd;quick.innerHTML=qk;}

let io;
function render(){
  let html="",any=false;
  // Mục "Tất cả video" (theo mới nhất) — chỉ khi không tìm kiếm, tránh trùng lặp
  if(!query){
    const all=allVideosSorted();
    if(all.length){any=true;html+=sectionHTML(ALL_ID,"🆕","Tất cả video",all);}
  }
  orderedGroups().forEach(([cat,items])=>{
    const shown=items.filter(matchQ);
    if(!shown.length)return;any=true;
    html+=sectionHTML("cat-"+slug(cat),catIcon(cat),cat,shown);});
  content.innerHTML = any ? html : `<div class="state"><p>Không tìm thấy video phù hợp.</p></div>`;
  content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openV(VIDEOS[+c.dataset.i]));
  if(io)io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
  content.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

// "Xem thêm": bỏ giới hạn của mục đó và hiện nốt các video còn lại
content.addEventListener('click',e=>{
  const b=e.target.closest('.morebtn'); if(!b)return;
  const sec=document.getElementById(b.dataset.sec);
  if(sec){sec.classList.remove('clamped');
    sec.querySelectorAll('.card.extra').forEach((el,i)=>{
      el.style.transitionDelay=Math.min(i,6)*40+"ms";
      requestAnimationFrame(()=>el.classList.add('in'));});}
  const more=b.closest('.more'); if(more)more.remove();
});

function openV(v){
  pframe.innerHTML = v.type==="embed"
    ? `<iframe src="${v.src}" allow="autoplay;fullscreen;encrypted-media" allowfullscreen></iframe>`
    : `<video src="${v.src}" controls autoplay playsinline></video>`;
  document.getElementById('pcat').textContent=v.category;
  document.getElementById('ptitle').textContent=v.title;
  document.getElementById('pdesc').textContent=v.desc||"";
  modal.classList.add('open');
}
function closeV(){modal.classList.remove('open');pframe.innerHTML="";}

const dd=document.getElementById('dd');
document.getElementById('ddbtn').onclick=e=>{e.stopPropagation();dd.classList.toggle('open');};
document.addEventListener('click',()=>dd.classList.remove('open'));
ddmenu.onclick=e=>{if(e.target.closest('a'))dd.classList.remove('open');};
document.getElementById('close').onclick=closeV;
modal.onclick=e=>{if(e.target===modal)closeV();};
document.addEventListener('keydown',e=>{if(e.key==="Escape")closeV();});
qEl.oninput=e=>{query=e.target.value.toLowerCase().trim();render();};
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>10));

async function load(){
  // danh mục + settings: tải song song, lỗi cũng không chặn trang
  try{
    const [cats,sett]=await Promise.all([
      fetch("/api/categories?t="+Date.now(),{cache:"no-store"}).then(r=>r.json()).catch(()=>[]),
      fetch("/api/settings?t="+Date.now(),{cache:"no-store"}).then(r=>r.json()).catch(()=>({})),
    ]);
    if(Array.isArray(cats))CATEGORIES=cats;
    if(sett&&typeof sett==="object")SETTINGS=sett;
    applySettings();
  }catch(_){/* dùng mặc định viết cứng trong HTML */}
  try{
    const res=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    VIDEOS=await res.json();
    if(!Array.isArray(VIDEOS)||!VIDEOS.length){
      content.innerHTML=`<div class="state"><p>Chưa có video nào trong danh sách.</p></div>`;return;}
    buildMenu();render();
  }catch(err){
    content.innerHTML=`<div class="state"><p>Không tải được danh sách video.<br>Kiểm tra lại file videos.json.</p></div>`;
    console.error(err);
  }
}
load();
</script>
</body>
</html>
